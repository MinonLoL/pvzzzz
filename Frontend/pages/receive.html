<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Приём товаров</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gray-50 p-8">
        <div class="max-w-4xl mx-auto">
            <button onclick="location.href='shift.html'" class="flex items-center gap-2 mb-6 text-blue-600 hover:text-blue-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>

            <h1 class="text-3xl mb-8 text-gray-900">Приём товаров</h1>

            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="space-y-4">
                        <div>
                            <label for="productId" class="block text-sm text-gray-700 mb-2">
                                ID товара *
                            </label>
                            <input id="productId" type="text" placeholder="Введите ID товара" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <button id="addBtn" class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            Добавить товар
                        </button>
                    </div>
                </div>

                <div id="productsList" class="bg-white rounded-lg shadow-lg p-6 hidden">
                    <h2 class="text-xl mb-4 text-gray-900">Принятые товары (<span id="productCount">0</span>)</h2>
                    <div id="productsContainer" class="space-y-3"></div>
                    <button id="completeBtn" class="w-full mt-6 py-4 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                        Завершить приём (0 товаров)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }

        let products = [];

        const productInput = document.getElementById('productId');
        const addBtn = document.getElementById('addBtn');
        const productsList = document.getElementById('productsList');
        const productsContainer = document.getElementById('productsContainer');
        const productCountSpan = document.getElementById('productCount');
        const completeBtn = document.getElementById('completeBtn');

        function updateUI() {
            if (products.length > 0) {
                productsList.classList.remove('hidden');
                productCountSpan.textContent = products.length;
                completeBtn.textContent = `Завершить приём (${products.length} товаров)`;
                
                productsContainer.innerHTML = products.map((productId, index) => `
                    <div class="p-4 border border-gray-200 rounded-lg flex items-start gap-4">
                        <div class="w-12 h-12 bg-gray-100 rounded flex items-center justify-center flex-shrink-0">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-gray-900 mb-1">Товар #${index + 1}</h3>
                            <p class="text-sm text-gray-600">ID товара: ${productId}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                productsList.classList.add('hidden');
            }
        }

        addBtn.addEventListener('click', function() {
            const productId = productInput.value.trim();
            if (productId) {
                products.push(productId);
                productInput.value = '';
                updateUI();
                addBtn.disabled = true;
            }
        });

        productInput.addEventListener('input', function() {
            addBtn.disabled = !this.value.trim();
        });

        completeBtn.addEventListener('click', function() {
            if (products.length > 0) {
                alert(`Зарегистрировано товаров: ${products.length}`);
                window.location.href = 'shift.html';
            }
        });
    </script>
</body>
</html>
