<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Личный кабинет</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gray-50 p-8">
        <div class="max-w-4xl mx-auto">
            <button onclick="location.href='home.html'" class="flex items-center gap-2 mb-6 text-blue-600 hover:text-blue-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>

            <h1 class="text-3xl mb-8 text-gray-900">Личный кабинет</h1>

            <div class="bg-white rounded-lg shadow-lg p-8 space-y-6">
                <div class="border-b border-gray-200 pb-4">
                    <p class="text-sm text-gray-600 mb-1">Роль</p>
                    <p class="text-lg text-gray-900">Операционный аналитик</p>
                </div>

                <div class="space-y-3">
                    <button onclick="alert('Функция назначения роли будет доступна позже')" class="w-full py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                        </svg>
                        Назначить роль
                    </button>

                    <button onclick="localStorage.removeItem('isAuthenticated'); window.location.href='../index.html'" class="w-full py-4 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        Выйти из аккаунта
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
