<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Оформление возврата</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gray-50 p-8">
        <div class="max-w-4xl mx-auto">
            <button onclick="location.href='shift.html'" class="flex items-center gap-2 mb-6 text-blue-600 hover:text-blue-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>

            <h1 class="text-3xl mb-8 text-gray-900">Оформление возврата</h1>

            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="space-y-4">
                        <div>
                            <label for="productId" class="block text-sm text-gray-700 mb-2">
                                ID товара
                            </label>
                            <input id="productId" type="text" placeholder="Введите ID товара" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                        </div>
                    </div>
                </div>

                <button id="returnBtn" class="w-full py-4 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Оформить возврат
                </button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }

        const productInput = document.getElementById('productId');
        const returnBtn = document.getElementById('returnBtn');

        productInput.addEventListener('input', function() {
            returnBtn.disabled = !this.value.trim();
        });

        returnBtn.addEventListener('click', function() {
            if (productInput.value.trim()) {
                alert('Возврат успешно оформлен!');
                window.location.href = 'shift.html';
            }
        });
    </script>
</body>
</html>
