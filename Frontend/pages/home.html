<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Главная</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
        <!-- Шапка -->
        <div class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-6xl mx-auto px-8 py-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl text-gray-900 mb-1">Добро пожаловать!</h1>
                        <p class="text-gray-600">Пункт выдачи заказов</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-sm text-gray-500">Сегодня</p>
                            <p class="text-lg text-gray-900" id="currentDate"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="max-w-6xl mx-auto px-8 py-12">
            <div class="max-w-2xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="location.href='shift.html'" class="group relative overflow-hidden bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-8 hover:from-blue-600 hover:to-blue-700 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                        <div class="relative z-10">
                            <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <h3 class="text-xl mb-2">Начать смену</h3>
                            <p class="text-blue-100 text-sm">Перейти к операциям ПВЗ</p>
                        </div>
                        <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>
                    </button>

                    <button onclick="location.href='profile.html'" class="group relative overflow-hidden bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-8 hover:from-green-600 hover:to-green-700 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                        <div class="relative z-10">
                            <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <h3 class="text-xl mb-2">Личный кабинет</h3>
                            <p class="text-green-100 text-sm">Профиль и настройки</p>
                        </div>
                        <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const date = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('currentDate').textContent = date.toLocaleDateString('ru-RU', options);
        
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
