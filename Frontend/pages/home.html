<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Главная</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
        <div class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-6xl mx-auto px-8 py-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl text-gray-900 mb-1">Добро пожаловать!</h1>
                        <p class="text-gray-600">Пункт выдачи заказов</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto px-8 py-12">
            <div class="max-w-2xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="location.href='shift.html'" class="group relative overflow-hidden bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-8 hover:from-blue-600 hover:to-blue-700 transition-all">
                        <h3 class="text-xl mb-2">Начать смену</h3>
                        <p class="text-blue-100 text-sm">Перейти к операциям ПВЗ</p>
                    </button>

                    <button onclick="location.href='profile.html'" class="group relative overflow-hidden bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-8 hover:from-green-600 hover:to-green-700 transition-all">
                        <h3 class="text-xl mb-2">Личный кабинет</h3>
                        <p class="text-green-100 text-sm">Профиль и настройки</p>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
