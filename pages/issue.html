<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Выдача товара</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="min-h-screen bg-gray-50 p-8">
        <div class="max-w-4xl mx-auto">
            <button onclick="location.href='shift.html'" class="flex items-center gap-2 mb-6 text-blue-600 hover:text-blue-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>

            <h1 class="text-3xl mb-8 text-gray-900">Выдача товара</h1>

            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="space-y-4">
                        <div>
                            <label for="productId" class="block text-sm text-gray-700 mb-2">
                                ID товара
                            </label>
                            <input id="productId" type="text" placeholder="Введите ID товара" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <button id="issueBtn" class="w-full py-4 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Выдать товар
                </button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }

        const productInput = document.getElementById('productId');
        const issueBtn = document.getElementById('issueBtn');

        productInput.addEventListener('input', function() {
            issueBtn.disabled = !this.value.trim();
        });

        issueBtn.addEventListener('click', function() {
            if (productInput.value.trim()) {
                alert('Товар успешно выдан!');
                window.location.href = 'shift.html';
            }
        });
    </script>
</body>
</html>
