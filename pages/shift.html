<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ - Рабочая смена</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex flex-col overflow-hidden">
        <!-- Шапка -->
        <div class="bg-white shadow-sm border-b border-gray-100 flex-shrink-0">
            <div class="max-w-6xl mx-auto px-8 py-6">
                <button onclick="location.href='home.html'" class="flex items-center gap-2 mb-4 text-blue-600 hover:text-blue-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Назад
                </button>
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl text-gray-900 mb-1">Рабочая смена</h1>
                        <p class="text-gray-600">Выберите операцию для продолжения</p>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 bg-green-50 border border-green-200 rounded-lg">
                        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-green-800">Смена активна</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопки операций -->
        <div class="max-w-6xl mx-auto px-8 py-6 flex-shrink-0">
            <div class="flex flex-row gap-6 justify-center items-stretch flex-wrap">
                <button onclick="location.href='receive.html'" class="group relative overflow-hidden bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-2 border-green-200 hover:border-green-400 flex-1 min-w-[200px]">
                    <div class="relative z-10">
                        <div class="w-14 h-14 bg-green-100 rounded-xl flex items-center justify-center mb-4 group-hover:bg-green-200 transition-colors mx-auto">
                            <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl text-gray-900 mb-2 text-center">Принять</h3>
                        <p class="text-gray-600 text-sm text-center">Регистрация новых товаров</p>
                    </div>
                </button>

                <button onclick="location.href='issue.html'" class="group relative overflow-hidden bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-2 border-blue-200 hover:border-blue-400 flex-1 min-w-[200px]">
                    <div class="relative z-10">
                        <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-4 group-hover:bg-blue-200 transition-colors mx-auto">
                            <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl text-gray-900 mb-2 text-center">Выдать</h3>
                        <p class="text-gray-600 text-sm text-center">Выдача товара клиенту</p>
                    </div>
                </button>

                <button onclick="location.href='return.html'" class="group relative overflow-hidden bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-2 border-orange-200 hover:border-orange-400 flex-1 min-w-[200px]">
                    <div class="relative z-10">
                        <div class="w-14 h-14 bg-orange-100 rounded-xl flex items-center justify-center mb-4 group-hover:bg-orange-200 transition-colors mx-auto">
                            <svg class="w-7 h-7 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl text-gray-900 mb-2 text-center">Возврат</h3>
                        <p class="text-gray-600 text-sm text-center">Оформление возврата товара</p>
                    </div>
                </button>

                <button onclick="location.href='return.html'" class="group relative overflow-hidden bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 border-2 border-red-200 hover:border-red-400 flex-1 min-w-[200px]">
                    <div class="relative z-10">
                        <div class="w-14 h-14 bg-red-100 rounded-xl flex items-center justify-center mb-4 group-hover:bg-red-200 transition-colors mx-auto">
                            <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl text-gray-900 mb-2 text-center">Вернуть товар МП</h3>
                        <p class="text-gray-600 text-sm text-center">Возврат товара маркетплейсу</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- Таблица с товарами -->
        <div class="max-w-6xl mx-auto px-8 pb-8 flex-1 min-h-0 w-full overflow-hidden">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200 h-full flex flex-col">
                <div class="grid grid-cols-5 gap-4 bg-gradient-to-r from-gray-50 to-gray-100 px-6 py-4 border-b border-gray-200 text-sm font-semibold text-gray-700 uppercase tracking-wider flex-shrink-0">
                    <div>ID товара</div>
                    <div>Номер телефона</div>
                    <div>Название товара</div>
                    <div>Срок хранения</div>
                    <div>Ячейка на ПВЗ</div>
                </div>
                <div class="overflow-y-auto flex-1" id="ordersTable"></div>
                <div class="bg-gray-50 px-6 py-3 border-t border-gray-200 text-sm text-gray-600 flex-shrink-0">
                    Всего товаров на складе: <span id="totalCount" class="font-semibold">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = '../index.html';
        }

        // Генерация товаров
        const cellNumbers = Array.from({ length: 50 }, (_, i) => 100 + i);
        const phones = [
            "+7 (999) 123-45-67", "+7 (999) 234-56-78", "+7 (999) 345-67-89",
            "+7 (999) 456-78-90", "+7 (999) 567-89-01", "+7 (999) 678-90-12",
            "+7 (999) 789-01-23", "+7 (999) 890-12-34", "+7 (999) 901-23-45"
        ];
        const products = [
            "Смартфон Samsung A54", "Наушники JBL Tune", "Чехол для iPhone",
            "Зарядное устройство", "Планшет Samsung Tab", "Клавиатура Logitech",
            "Мышь беспроводная", "Монитор 24\"", "Внешний диск 1TB", "Ноутбук Lenovo"
        ];

        const orders = Array.from({ length: 50 }, (_, i) => ({
            id: `T-${1000 + i}`,
            phone: phones[Math.floor(Math.random() * phones.length)],
            name: products[Math.floor(Math.random() * products.length)],
            expiry: `${String(Math.floor(Math.random() * 28) + 1).padStart(2, '0')}.${String(Math.floor(Math.random() * 3) + 4).padStart(2, '0')}.2026`,
            cell: cellNumbers[i]
        }));

        const tableBody = document.getElementById('ordersTable');
        orders.forEach(order => {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-5 gap-4 px-6 py-4 border-b border-gray-100 hover:bg-blue-50 transition-colors text-gray-700';
            row.innerHTML = `
                <div class="font-mono text-sm font-medium text-blue-600">${order.id}</div>
                <div class="text-sm">${order.phone}</div>
                <div class="text-sm truncate" title="${order.name}">${order.name}</div>
                <div class="text-sm"><span class="px-2 py-1 bg-orange-50 text-orange-700 rounded-md border border-orange-200">${order.expiry}</span></div>
                <div class="text-sm font-mono bg-gray-100 px-2 py-1 rounded-md inline-block w-fit">#${order.cell}</div>
            `;
            tableBody.appendChild(row);
        });

        document.getElementById('totalCount').textContent = orders.length;
    </script>
</body>
</html>
